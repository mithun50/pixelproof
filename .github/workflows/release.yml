name: Release

# Triggers when you push a version tag, e.g.  git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write # required to create the GitHub Release and upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Download ONNX model (git-ignored asset)
        run: |
          mkdir -p assets/models
          curl -L --fail -o assets/models/model.onnx \
            "https://huggingface.co/onnx-community/SMOGY-Ai-images-detector-ONNX/resolve/main/onnx/model_quantized.onnx?download=true"

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          {
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyPassword=$KEY_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "storeFile=upload-keystore.jks"
          } > android/key.properties

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build signed APK
        run: flutter build apk --release

      - name: Build signed AAB
        run: flutter build appbundle --release

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/pixelproof-${{ github.ref_name }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "dist/pixelproof-${{ github.ref_name }}.aab"
          # Stable-named copies so "latest release" download links never change.
          cp build/app/outputs/flutter-apk/app-release.apk "dist/pixelproof.apk"
          cp build/app/outputs/bundle/release/app-release.aab "dist/pixelproof.aab"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PixelProof ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/pixelproof-${{ github.ref_name }}.apk
            dist/pixelproof-${{ github.ref_name }}.aab
            dist/pixelproof.apk
            dist/pixelproof.aab

      - name: Clean up signing material
        if: always()
        run: rm -f android/app/upload-keystore.jks android/key.properties
